<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--flex-column">
            <img class="header__logo" src="./images/logotipo.svg" alt="">
            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>
                    <div class="contact-form__linha">
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome"
                            placeholder="Nome" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">E-mail</label>
                    </div>
                    <div class="contact-form__linha">
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--inteiro" name="email" id="email"
                            placeholder="E-mail" type="email">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone</label>
                    </div>
                    <div class="contact-form__linha">
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="pais" id="pais"
                            placeholder="+55" type="tel">
                        <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd"
                            placeholder="ddd" type="tel">
                        <input class="contact-form__input contact-form__input--terco" name="telefone" id="telefone"
                            placeholder="ex: 99999-9999" type="tel">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereco">Endereco</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--quarto " name="cep" id="cep"
                            placeholder="cep" type="text">


                        <input class="contact-form__input contact-form__input--metade" name="rua" id="rua"
                            placeholder="Rua la de casa" type="text">


                        <input class="contact-form__input contact-form__input--quarto " name="numero" id="numero"
                            placeholder="ex:555" type="text">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereco"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="apartamento"
                            id="apartamento" placeholder="Apartamento ou Bloco" type="text">


                        <input class="contact-form__input contact-form__input--terco" name="bairro" id="bairro"
                            placeholder="Bairro" type="text">


                        <input class="contact-form__input contact-form__input--terco" name="cidade" id="cidade"
                            placeholder="Cidade" type="text">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereco"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="estado" id="estado"
                            placeholder="Estado" type="text">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a container-form__col-a--anotacoes">
                        <label class="contact-form__label" for="Anotações">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--anotacoes" name="anotacoes"
                            id="anotacoes" placeholder="Suas anotações aqui"></textarea>
                    </div>
                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a"></div>

                    <div class="contact-form__col-b button-container">
                        <button class="contact-form__button contact-form__button--medate" type="submit">Cadastrar</button>
                        <button class="contact-form__button contact-form__button--medate" type="reset">Limpar</button>
                    </div>

                </div>
            </form>
        </div>
    </main>
</body>

</html>
